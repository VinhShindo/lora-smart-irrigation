<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Smart Garden Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(148, 163, 184, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-amber: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        h2 {
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-blue);
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card.offline {
            opacity: 0.6;
            filter: grayscale(0.9);
            border-color: var(--accent-red);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .node-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge-online {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .badge-offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .data-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .data-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .data-value {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .success {
            color: var(--accent-green);
        }

        .warning {
            color: var(--accent-amber);
        }

        .control-panel {
            margin-bottom: 20px;
            text-align: center;
        }

        .status-msg {
            font-size: 0.8rem;
            margin-bottom: 8px;
            min-height: 18px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-on {
            background: var(--accent-green);
            color: #000;
        }

        .btn-off {
            background: var(--accent-red);
            color: white;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .sensor-panel {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .chart-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
            padding: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chart-header-mini {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
        }

        .chart-val-current {
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100px;
        }

        .status-waiting {
            color: var(--accent-amber);
            animation: pulse-text 1.5s infinite;
        }

        .status-executing {
            color: var(--accent-green);
        }
    </style>
</head>

<body>
    <h2><i class="fa-solid fa-leaf"></i> SMART GARDEN CENTER</h2>
    <div class="grid">
        {% for node in nodes %}
        <div class="card offline" id="{{node}}">
            <div class="card-header">
                <div class="node-name">{{node}}</div>
                <div class="status-badge badge-offline node-status-text">OFFLINE</div>
            </div>

            <div class="data-grid">
                <div class="data-item">
                    <span class="data-label">📡 RSSI</span>
                    <span class="data-value rssi">--</span>
                </div>
                <div class="data-item">
                    <span class="data-label">🔌 Dòng điện</span>
                    <span class="data-value amp">-- A</span>
                </div>
                <div class="data-item">
                    <span class="data-label">⚙ Bơm</span>
                    <span class="data-value pump">--</span>
                </div>
                <div class="data-item">
                    <span class="data-label">🌊 Lưu lượng</span>
                    <span class="data-value flow success">--</span>
                </div>
                <div class="data-item">
                    <span class="data-label">🤖 Chế độ</span>
                    <span class="data-value mode">--</span>
                </div>
                <div class="data-item">
                    <span class="data-label">⏳ Đã chạy</span>
                    <span class="data-value duration">0 m</span>
                </div>
                <div class="data-item">
                    <span class="data-label">📉 Ngưỡng đất</span>
                    <span class="data-value last-soil">--%</span>
                </div>
                <div class="data-item">
                    <span class="data-label">🕒 Updated</span>
                    <span class="data-value device-updated">--:--:--</span>
                </div>

            </div>

            <div class="control-panel">
                <div class="status-msg pending-msg">SYSTEM READY</div>
                <div class="btn-group">
                    <button class="btn-on" onclick="sendControl('{{node}}', 'ON')">BẬT</button>
                    <button class="btn-off" onclick="sendControl('{{node}}', 'OFF')">TẮT</button>
                </div>
            </div>

            <div class="sensor-panel">
                <div class="charts-grid">
                    <div class="chart-box">
                        <div class="chart-header-mini" style="color: #fca5a5;">
                            <span><i class="fa-solid fa-temperature-half"></i> Nhiệt độ</span>
                            <span class="chart-val-current temp-val">--°C</span>
                        </div>
                        <div class="canvas-container">
                            <canvas id="chart-temp-{{node}}"></canvas>
                        </div>
                    </div>

                    <div class="chart-box">
                        <div class="chart-header-mini" style="color: #93c5fd;">
                            <span><i class="fa-solid fa-droplet"></i> Độ ẩm</span>
                            <span class="chart-val-current humi-val">--%</span>
                        </div>
                        <div class="canvas-container">
                            <canvas id="chart-humi-{{node}}"></canvas>
                        </div>
                    </div>

                    <div class="chart-box">
                        <div class="chart-header-mini" style="color: #86efac;">
                            <span><i class="fa-solid fa-seedling"></i> Đất</span>
                            <span class="chart-val-current soil-val">--%</span>
                        </div>
                        <div class="canvas-container">
                            <canvas id="chart-soil-{{node}}"></canvas>
                        </div>
                    </div>

                    <div class="chart-box">
                        <div class="chart-header-mini" style="color: #fcd34d;">
                            <span><i class="fa-solid fa-sun"></i> Ánh sáng</span>
                            <span class="chart-val-current light-val">--</span>
                        </div>
                        <div class="canvas-container">
                            <canvas id="chart-light-{{node}}"></canvas>
                        </div>
                    </div>
                </div>

                <div style="text-align: right; font-size: 0.65rem; color: #64748b; margin-top: 8px;">
                    Cập nhật lúc: <span class="time">--:--:--</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        const socket = io();
        const charts = {};
        const nodeControlState = {};
        const watchdogTimers = {};

        Chart.defaults.color = '#64748b';
        Chart.defaults.borderColor = 'rgba(148, 163, 184, 0.05)';
        Chart.defaults.font.family = 'Inter';
        Chart.defaults.font.size = 10;

        function initNodeState(nodeId) {
            const el = document.getElementById(nodeId);
            nodeControlState[nodeId] = {
                state: "IDLE",
                cmdId: null,
                statusEl: el ? el.querySelector(".pending-msg") : null
            };
        }

        function getStatusEl(nodeId) {
            return nodeControlState[nodeId]?.statusEl;
        }

        function setState(nodeId, newState) {
            nodeControlState[nodeId].state = newState;
        }

        function getState(nodeId) {
            return nodeControlState[nodeId]?.state || "IDLE";
        }

        function setCmd(nodeId, cmdId) {
            nodeControlState[nodeId].cmdId = cmdId;
        }

        function getCmd(nodeId) {
            return nodeControlState[nodeId]?.cmdId;
        }

        function clearCmd(nodeId) {
            nodeControlState[nodeId].cmdId = null;
        }

        function disableControls(el, state) {
            el.querySelectorAll("button").forEach(b => b.disabled = state);
        }

        socket.on("connect", () => {
            {% for node in nodes %}
            socket.emit("subscribe_node", { node_id: "{{node}}" });
            initNodeState("{{node}}");
            {% endfor %}
        });

        function createMiniChart(id, color) {
            const ctx = document.getElementById(id).getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 100);
            gradient.addColorStop(0, color + '50');
            gradient.addColorStop(1, color + '00');

            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: color, borderWidth: 1.5, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: gradient }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: true, position: 'right', ticks: { count: 3, font: { size: 9 }, color: '#475569' }, grid: { display: false } }
                    },
                    animation: false
                }
            });
        }

        function updateCharts(nodeId) {
            fetch(`/api/node/${nodeId}/measurements`)
                .then(r => r.json())
                .then(data => {
                    if (!data || !data.length) return;
                    data.reverse();
                    const last = data[data.length - 1];
                    const el = document.getElementById(nodeId);

                    el.querySelector(".temp-val").innerText = last.temp + "°C";
                    el.querySelector(".humi-val").innerText = last.humi + "%";
                    el.querySelector(".soil-val").innerText = last.soil + "%";
                    el.querySelector(".light-val").innerText = last.light;

                    if (!charts[nodeId]) {
                        charts[nodeId] = {
                            temp: createMiniChart(`chart-temp-${nodeId}`, '#fca5a5'),
                            humi: createMiniChart(`chart-humi-${nodeId}`, '#93c5fd'),
                            soil: createMiniChart(`chart-soil-${nodeId}`, '#86efac'),
                            light: createMiniChart(`chart-light-${nodeId}`, '#fcd34d')
                        };
                    }

                    const labels = data.map(() => "");
                    const c = charts[nodeId];

                    c.temp.data.labels = labels; c.temp.data.datasets[0].data = data.map(d => d.temp); c.temp.update();
                    c.humi.data.labels = labels; c.humi.data.datasets[0].data = data.map(d => d.humi); c.humi.update();
                    c.soil.data.labels = labels; c.soil.data.datasets[0].data = data.map(d => d.soil); c.soil.update();
                    c.light.data.labels = labels; c.light.data.datasets[0].data = data.map(d => d.light); c.light.update();
                });
        }

        function sendControl(nodeId, action) {
            const el = document.getElementById(nodeId);
            if (!el) return;

            if (!nodeControlState[nodeId])
                initNodeState(nodeId);

            if (el.classList.contains("offline")) return;

            console.log("STATE BEFORE SEND:", nodeControlState[nodeId]);
            if (getState(nodeId) !== "IDLE") return;

            const cmdId = Date.now().toString();
            const statusMsg = getStatusEl(nodeId);;
            if (!statusMsg) return;

            setState(nodeId, "SENDING");
            setCmd(nodeId, cmdId);

            disableControls(el, true);

            statusMsg.innerText = `ĐANG GỬI LỆNH ${action}...`;
            statusMsg.className = "status-msg status-waiting";
            statusMsg.style.color = "#f59e0b";

            socket.emit("control", { node_id: nodeId, action, cmd_id: cmdId });

            if (watchdogTimers[nodeId]) clearTimeout(watchdogTimers[nodeId]);

            watchdogTimers[nodeId] = setTimeout(() => {

                if (getState(nodeId) !== "SENDING" &&
                    getState(nodeId) !== "EXECUTING") return;

                setState(nodeId, "TIMEOUT");
                clearCmd(nodeId);
                delete watchdogTimers[nodeId];

                statusMsg.innerText = "TIMEOUT";
                statusMsg.className = "status-msg";
                statusMsg.style.color = "#ef4444";

                if (!el.classList.contains("offline"))
                    disableControls(el, false);

                setTimeout(() => {
                    setState(nodeId, "IDLE");
                    statusMsg.innerText = "SYSTEM READY";
                    statusMsg.className = "status-msg";
                    statusMsg.style.color = "";
                }, 1500);

            }, 8000);
        }

        socket.on("node_pending", data => {
            const nodeId = data.node_id;
            const el = document.getElementById(nodeId);
            if (!el) return;
            if (data.cmd_id !== getCmd(nodeId)) return;
            const statusMsg = getStatusEl(nodeId);
            if (!statusMsg) return;

            if (data.queue_pos && data.queue_pos > 1) {
                setState(nodeId, "QUEUED");
                statusMsg.innerText = "ĐANG XẾP HÀNG (#" + data.queue_pos + ")";
                statusMsg.className = "status-msg status-waiting";
            } else {
                setState(nodeId, "EXECUTING");
                statusMsg.innerText = "EXECUTING...";
                statusMsg.className = "status-msg status-executing";
            }
        });

        socket.on("node_ack", data => {
            const nodeId = data.node_id;
            const el = document.getElementById(nodeId);
            if (!el) return;

            const currentCmd = getCmd(nodeId);
            if (!currentCmd) return;
            if (data.cmd_id !== currentCmd) return;

            if (watchdogTimers[nodeId]) {
                clearTimeout(watchdogTimers[nodeId]);
                delete watchdogTimers[nodeId];
            }

            const statusMsg = getStatusEl(nodeId);;
            if (!statusMsg) return;

            if (data.pump !== undefined)
                el.querySelector(".pump").innerText = data.pump;

            if (data.mode !== undefined) {
                const modeEl = el.querySelector(".mode");
                modeEl.innerText = data.mode;
                modeEl.style.color =
                    data.mode === "SEN"
                        ? "var(--accent-blue)"
                        : "var(--accent-amber)";
            }

            if (data.amp !== undefined && data.amp !== null)
                el.querySelector(".amp").innerText = data.amp + " A";

            if (data.flow !== undefined && data.flow !== null)
                el.querySelector(".flow").innerText = data.flow + " L/m";

            if (data.last_soil !== undefined && data.last_soil !== null)
                el.querySelector(".last-soil").innerText = data.last_soil + "%";

            if (data.server_time) {
                const t = new Date(data.server_time).toLocaleTimeString();
                el.querySelector(".device-updated").innerText = t;
                el.querySelector(".time").innerText = t;
            }

            clearCmd(nodeId);
            setState(nodeId, "IDLE");

            disableControls(el, false);

            if (data.success === false) {
                statusMsg.innerText = data.message || "THẤT BẠI!";
                statusMsg.className = "status-msg";
                statusMsg.style.color = "#ef4444";
            } else {
                statusMsg.innerText = "THÀNH CÔNG!";
                statusMsg.className = "status-msg";
                statusMsg.style.color = "#10b981";
            }

            setTimeout(() => {
                statusMsg.innerText = "SYSTEM READY";
                statusMsg.className = "status-msg";
                statusMsg.style.color = "";
            }, 1500);
        });

        socket.on("node_realtime", data => {
            const el = document.getElementById(data.node_id);
            if (!el) return;

            el.querySelector(".rssi").innerText = (data.rssi ?? "--") + " dBm";
            el.querySelector(".amp").innerText = (data.amp ?? "--") + " A";
            el.querySelector(".flow").innerText = (data.flow ?? "--") + " L/m";
            el.querySelector(".pump").innerText = data.pump || "OFF";
            el.querySelector(".mode").innerText = data.mode || "--";
            el.querySelector(".duration").innerText = (data.duration_minutes || 0) + " m";

            if (data.last_soil !== undefined && data.last_soil !== null)
                el.querySelector(".last-soil").innerText = data.last_soil + "%";

            const timeStr = data.updated_at
                ? new Date(data.updated_at).toLocaleTimeString()
                : "--:--:--";

            el.querySelector(".device-updated").innerText = timeStr;
            el.querySelector(".time").innerText = timeStr;

            const modeEl = el.querySelector(".mode");
            modeEl.style.color =
                data.mode === "SEN"
                    ? "var(--accent-blue)"
                    : "var(--accent-amber)";

            if (data.current_status === "OFFLINE") {
                el.classList.add("offline");
                el.querySelector(".node-status-text").innerText = "OFFLINE";
                el.querySelector(".node-status-text").className = "status-badge badge-offline node-status-text";
                disableControls(el, true);
            }

            if (data.current_status === "ONLINE") {
                el.classList.remove("offline");
                el.querySelector(".node-status-text").innerText = "ONLINE";
                el.querySelector(".node-status-text").className = "status-badge badge-online node-status-text";

                if (getState(data.node_id) === "IDLE")
                    disableControls(el, false);
            }
        });

        setInterval(() => {
            {% for node in nodes %} updateCharts("{{node}}"); {% endfor %}
        }, 10000);

        window.onload = () => {
            {% for node in nodes %} updateCharts("{{node}}"); {% endfor %}
        };
    </script>
</body>

</html>
